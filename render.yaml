# Render Blueprint Specification for PathFinder AI Backend
services:
  - type: web
    name: pathfinder-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: PRODUCTION
        value: "true"
