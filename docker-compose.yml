version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pathfinder_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pathfinder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pathfinder_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/pathfinder
      - SECRET_KEY=super-secret-key-for-development-hackathon-2026
      - GEMINI_API_KEY=
    depends_on:
      - db

volumes:
  pgdata:
